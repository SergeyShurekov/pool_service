services:
  # Reverse proxy (nginx)
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: always
    networks:
      - poolservice-network

  # Ваше приложение (Next.js)
  web:
    build: .
    expose:
      - "3000"               # вместо ports: используем expose, чтобы порт был виден только внутри сети
    environment:
      VIRTUAL_HOST: obsluzivanie-baseynov-sochi.ru
      VIRTUAL_PORT: "3000"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
    networks:
      - poolservice-network
    restart: always

networks:
  poolservice-network:
    driver: bridge
